<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MyBourse</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
    <h1 class="text-center mb-4">MyBourse</h1>

    <div class="card shadow mb-4">
        <div class="card-body d-flex flex-wrap gap-3 align-items-end">

            <div>
                <label class="form-label fw-bold">Action</label>
                <select id="stock1" class="form-select"></select>
            </div>

            <div>
                <label class="form-label fw-bold">Période</label>
                <select id="period" class="form-select">
                    <option value="1w">1 semaine</option>
                    <option value="1m" selected>1 mois</option>
                    <option value="1y">1 an</option>
                </select>
            </div>
            
            <div>
                <label class="form-label fw-bold">Période</label>
                <select id="chart-type" class="form-select">
                    <option value="line">Ligne</option>
                    <option value="bar">Barres</option>
                </select>
            </div>


            <button id="load-btn" class="btn btn-primary">Charger</button>
        </div>
    </div>

    <div id="loader" class="text-center text-muted mb-3" style="display:none">Chargement...</div>
    <div id="error-box" class="alert alert-danger" style="display:none"></div>

    <div class="card shadow">
        <div class="card-body">
            <canvas id="myChart"></canvas>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="dist/ui/app.js"></script>

</body>
</html>
